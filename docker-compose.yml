services:
  etl-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    container_name: retail-etl-runner
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    command: >
      bash -c "airflow db migrate"
    volumes:
      - airflow-db:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./tests:/opt/airflow/tests
      - ./sql:/opt/airflow/sql
    networks:
      - airflow-network

  airflow-api-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: airflow-api-server
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    command: airflow api-server
    ports:
      - "8080:8080"
    volumes:
      - airflow-db:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./tests:/opt/airflow/tests
      - ./sql:/opt/airflow/sql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - airflow-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    command: airflow scheduler
    volumes:
      - airflow-db:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./tests:/opt/airflow/tests
      - ./sql:/opt/airflow/sql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - airflow-network

  airflow-dag-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: airflow-dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    command: airflow dag-processor
    volumes:
      - airflow-db:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./tests:/opt/airflow/tests
      - ./sql:/opt/airflow/sql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - airflow-network

volumes:
  airflow-db:

networks:
  airflow-network: